<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Catálogo de Ropa Interior</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background-color: #fff5f5; padding: 20px; color: #4a4a4a; }
        
        header { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #d63031; margin-bottom: 15px; }
        
        .controles { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
        #buscador { padding: 10px; border: 2px solid #fad1d1; border-radius: 20px; width: 220px; outline: none; }
        #tipo-venta { padding: 10px; border: 2px solid #fad1d1; border-radius: 20px; font-weight: bold; color: #d63031; }

        .contenedor { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .catalogo { flex: 3; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        
        .card { background: white; padding: 15px; border-radius: 12px; width: 200px; text-align: center; border: 1px solid #ffe3e3; }
        .card img { max-width: 100%; height: auto; border-radius: 8px; }
        .precio { color: #e17055; font-weight: bold; font-size: 1.2rem; margin: 8px 0; }
        .btn-agregar { background-color: #ff7675; color: white; border: none; padding: 10px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; }

        .carrito-seccion { flex: 1; background: white; padding: 20px; border-radius: 12px; min-width: 280px; border-top: 4px solid #ff7675; }
        .carrito-item { display: flex; justify-content: space-between; border-bottom: 1px solid #f5f5f5; padding: 8px 0; font-size: 0.9rem; }
        .btn-eliminar { background: none; border: none; color: #ff7675; font-weight: bold; cursor: pointer; }
        
        .alerta-envio { background: #e3fcef; color: #00875a; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; text-align: center; }
        .alerta-minimo { background: #ffebe6; color: #de350b; padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; text-align: center; }
        
        .total { font-size: 1.3rem; font-weight: bold; margin: 15px 0; text-align: right; }
        .btn-wsp { display: block; background-color: #25d366; color: white; padding: 12px; border-radius: 25px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn-wsp.deshabilitado { background-color: #b2bec3; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">👙 MI MARCA - LINGERIE</div>
        <div class="controles">
            <input type="text" id="buscador" placeholder="Buscar..." onkeyup="filtrar()">
            <select id="tipo-venta" onchange="cambiarModalidad()">
                <option value="minorista">Venta Minorista</option>
                <option value="mayorista">Venta Mayorista</option>
            </select>
        </div>
    </header>

    <div class="contenedor">
        <div class="catalogo" id="lista-productos">
            
            <div class="card" data-nombre="conjunto encaje" data-min="12000" data-may="6500">
                <img src="https://picsum.photos" alt="Conjunto">
                <h3>Conjunto Encaje</h3>
                <p class="precio" id="p1">$12.000</p>
                <button class="btn-agregar" onclick="agregar('Conjunto Encaje', 12000, 6500)">Agregar</button>
            </div>

            <div class="card" data-nombre="pack colaless" data-min="5000" data-may="2800">
                <img src="https://picsum.photos" alt="Colaless">
                <h3>Pack Colaless</h3>
                <p class="precio" id="p2">$5.000</p>
                <button class="btn-agregar" onclick="agregar('Pack Colaless', 5000, 2800)">Agregar</button>
            </div>

            <div class="card" data-nombre="corpiño deportivo" data-min="9500" data-may="5100">
                <img src="https://picsum.photos" alt="Deportivo">
                <h3>Corpiño Deportivo</h3>
                <p class="precio" id="p3">$9.500</p>
                <button class="btn-agregar" onclick="agregar('Corpiño Deportivo', 9500, 5100)">Agregar</button>
            </div>
            
        </div>

        <div class="carrito-seccion">
            <h2>Tu Pedido (<span id="txt-mod">Minorista</span>)</h2>
            <div id="alertas"></div>
            <div id="items-carrito">
                <p style="color: #888; text-align: center; margin-top: 15px;">El carrito está vacío.</p>
            </div>
            <div class="total">Total: $<span id="precio-total">0</span></div>
            <a href="#" id="enviar-wsp" class="btn-wsp deshabilitado" onclick="enviar(event)">Enviar por WhatsApp</a>
        </div>
    </div>

    <script>
        let carrito = [];
        let mod = 'minorista';

        function cambiarModalidad() {
            mod = document.getElementById('tipo-venta').value;
            document.getElementById('txt-mod').innerText = mod.charAt(0).toUpperCase() + mod.slice(1);
            
            const lista = document.querySelectorAll('.card');
            lista.forEach(p => {
                const id = p.querySelector('.precio').id;
                const min = p.getAttribute('data-min');
                const may = p.getAttribute('data-may');
                const precioFinal = mod === 'minorista' ? min : may;
                document.getElementById(id).innerText = "$" + parseInt(precioFinal).toLocaleString('es-AR');
            });
            carrito = [];
            dibujar();
        }

        function agregar(nombre, min, may) {
            let precio = mod === 'minorista' ? min : may;
            const existe = carrito.find(i => i.nombre === nombre);
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ nombre, precio: parseInt(precio), cantidad: 1 });
            }
            dibujar();
        }

        function eliminar(nombre) {
            carrito = carrito.filter(i => i.nombre !== nombre);
            dibujar();
        }

        function dibujar() {
            const items = document.getElementById('items-carrito');
            const totalTxt = document.getElementById('precio-total');
            const alertas = document.getElementById('alertas');
            const boton = document.getElementById('enviar-wsp');
            
            if (carrito.length === 0) {
                items.innerHTML = '<p style="color:#888; text-align:center; margin-top:15px;">Vacio.</p>';
                totalTxt.innerText = '0';
                alertas.innerHTML = '';
                boton.classList.add('deshabilitado');
                return;
            }

            items.innerHTML = '';
            let total = 0;
            carrito.forEach(i => {
                total += i.precio * i.cantidad;
                items.innerHTML += `
                    <div class="carrito-item">
                        <div>
                            <strong>${i.nombre}</strong><br>
                            <small>${i.cantidad}x $${i.precio.toLocaleString('es-AR')}</small>
                        </div>
                        <button class="btn-eliminar" onclick="eliminar('${i.nombre}')">❌</button>
                    </div>`;
            });
            totalTxt.innerText = total.toLocaleString('es-AR');

            let limite = mod === 'minorista' ? 30000 : 300000;
            
            if (total >= limite) {
                alertas.innerHTML = '<div class="alerta-envio">🎉 ¡ENVÍO GRATIS!</div>';
                boton.classList.remove('deshabilitado');
            } else {
                let falta = limite - total;
                alertas.innerHTML = '<div class="alerta-minimo">Faltan $' + falta.toLocaleString('es-AR') + ' para envío gratis.</div>';
                boton.classList.add('deshabilitado');
            }
        }

        function filtrar() {
            const txt = document.getElementById('buscador').value.toLowerCase();
            const lista = document.querySelectorAll('.card');
            lista.forEach(p => {
                const nombre = p.getAttribute('data-nombre');
                p.style.display = nombre.includes(txt) ? "block" : "none";
            });
        }

        function enviar(e) {
            e.preventDefault();
            let tel = "54911XXXXXXXX"; 
            let msg = "¡Hola! Pedido " + mod.toUpperCase() + ":\n\n";
            
            carrito.forEach(i => {
                msg += "• " + i.cantidad + "x " + i.nombre + " ($" + (i.precio * i.cantidad).toLocaleString('es-AR') + ")\n";
            });
            
            msg += "\n*Total: $" + document.getElementById('precio-total').innerText + "*\n🚚 Envío Gratis.";
            window.open("https://wa.me" + tel + "?text=" + encodeURIComponent(msg), '_blank');
        }
    </script>
</body>
</html>
